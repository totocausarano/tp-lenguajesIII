<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafío 3 — Registrador Estadístico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f3f4f6; }
    .page-title {
      background: linear-gradient(135deg, #d946ef, #701a75);
      color: white;
      border-radius: 0 0 1rem 1rem;
      padding: 2rem 1rem;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <div class="page-title text-center">
    <h1 class="fw-bold mb-1"><i class="bi bi-list-ol me-2"></i>Registrador de Números</h1>
    <p class="mb-0 opacity-75">Desafío 3 — Lenguajes III · 2026</p>
  </div>

  <div class="container pb-5" style="max-width: 750px;">
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white fw-semibold d-flex justify-content-between align-items-center">
        <span><i class="bi bi-plus-square me-2"></i>Ingreso de valores</span>
        <button class="btn btn-sm btn-outline-danger" onclick="reiniciar()">
          <i class="bi bi-arrow-counterclockwise me-1"></i>Reiniciar
        </button>
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="numero" class="form-label fw-semibold">Número</label>
            <input type="number" id="numero" class="form-control" placeholder="Ej: -5, 14, 23" step="any">
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button class="btn btn-primary w-100" onclick="agregarNumero()">Agregar</button>
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button class="btn btn-info w-100 text-white" onclick="tablaMultiplicar()">Ver Tabla</button>
          </div>
        </div>
        <div id="error" class="mt-3"></div>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-secondary text-white fw-semibold">
        <i class="bi bi-collection me-2"></i>Elementos ingresados
      </div>
      <div class="card-body">
        <div id="listaNumeros" class="text-muted fst-italic">
          Ningún número en el arreglo.
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-success text-white fw-semibold">
            <i class="bi bi-calculator me-2"></i>Métricas analíticas
          </div>
          <div class="card-body">
            <div id="estadisticas" class="text-muted fst-italic">
              Sin datos para calcular estadísticas.
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-warning text-dark fw-semibold">
            <i class="bi bi-grid-3x3 me-2"></i>Tabla de multiplicar
          </div>
          <div class="card-body">
            <div id="tabla" class="text-muted fst-italic">
              No se ha solicitado ninguna tabla.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="desafio3.js"></script>
</body>
</html>
