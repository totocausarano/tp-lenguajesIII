<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro UCASAL - Trabajo Práctico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Formulario de Registro</h4>
                    </div>
                    <div class="card-body">
                        <form id="registroForm" novalidate>
                            
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan" required>
                                <div class="error-feedback" id="errorNombre"></div>
                            </div>

                            <div class="mb-3">
                                <label for="apellido" class="form-label">Apellido</label>
                                <input type="text" class="form-control" id="apellido" placeholder="Ej: Pérez" required>
                                <div class="error-feedback" id="errorApellido"></div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Institucional</label>
                                <input type="email" class="form-control" id="email" placeholder="usuario@ucasal.edu.ar" required>
                                <div class="error-feedback" id="errorEmail"></div>
                            </div>

                            <div class="mb-3">
                                <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento</label>
                                <input type="date" class="form-control" id="fechaNacimiento" required>
                                <div class="error-feedback" id="errorFecha"></div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" required>
                                <div class="error-feedback" id="errorPassword"></div>
                            </div>

                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Repetir Contraseña</label>
                                <input type="password" class="form-control" id="confirmPassword" required>
                                <div class="error-feedback" id="errorConfirmPassword"></div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100" id="btnEnviar">Enviar</button>
                        </form>
                    </div>
                </div>
                <div id="mensajeExito" class="alert alert-success mt-3 d-none">
                    ¡Formulario enviado correctamente!
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
