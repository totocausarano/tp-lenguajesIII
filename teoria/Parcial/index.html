<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcial Lenguajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body class="fondo-pagina d-flex justify-content-center align-items-center min-vh-100">
    
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Formulario Inscripcion Cruso</h5>
            
                <form id="inscripcion">
                    <div class="campo-pregunta mb-3">
                        <label for="nombre" class="form-label fw-semibold">Nombre y Apellido:</label>
                        <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej: Martin Perez">
                        <span id="errorNombre" class="error-texto d-block text-danger small mt-1"></span>
                    </div>
                    
                    <div class="inscripcion mb-3">
                        <label for="dni" class="form-label fw-semibold">DNI (Sin puntos ni guiones):</label>
                        <input type="text" id="dni" name="dni" class="form-control" placeholder="Ej: 46530374">
                        <span id="errorDni" class="error-texto d-block text-danger small mt-1"></span>
                    </div>
                    
                    <div class="inscripcion mb-4">
                        <label for="fechaNac" class="form-label fw-semibold">Fecha de Nacimiento:</label>
                        <input type="date" id="fechaNac" name="fechaNac" class="form-control">
                        <span id="errorFecha" class="error-texto d-block text-danger small mt-1"></span>
                    </div>
                    
                    <button type="submit" id="btnEnviar" class="btn btn-primary w-100 fw-bold mt-2">Enviar Inscripcion</button>
                </form>

                <div id="mensaje-exito" class="exito-texto"></div>

                <div class="preguntas-progresivas">
                    <button type="button" id="btnPreguntas" class="btn btn-info w-100 fw-bold"> Iniciar Preguntas</button>
                </div>
                
                <div id="resultados-preguntas" class="contenedor-preguntas-progre"></div>
            </div> </div> </div> <script src="script.js"></script>    
</body>
</html>
